
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Easy Account Professional Suite</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#1152d4",
            "accent-gold": "#b58d40",
            "navy-deep": "#0f172a",
            "background-light": "#f8f9fa",
            "border-light": "#e2e8f0",
            "card-light": "#ffffff",
          },
          fontFamily: {
            "display": ["Manrope", "sans-serif"],
            "serif": ["Playfair Display", "serif"]
          }
        },
      },
    }
  </script>
  <style>
    body { font-family: 'Manrope', sans-serif; }
    .serif-font { font-family: 'Playfair Display', serif; }
    
    /* Hide number input spinners */
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    /* Custom White Theme Scrollbar */
    ::-webkit-scrollbar {
      width: 12px;
      height: 12px;
    }
    ::-webkit-scrollbar-track {
      background: #ffffff;
      border-left: 1px solid #e2e8f0;
    }
    ::-webkit-scrollbar-thumb {
      background: #e2e8f0;
      border-radius: 10px;
      border: 3px solid #ffffff;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #cbd5e1;
    }
    
    /* Horizontal specific style */
    .overflow-x-auto::-webkit-scrollbar {
      height: 6px;
    }
    .overflow-x-auto::-webkit-scrollbar-track {
      background: #f1f1f1;
    }
    .overflow-x-auto::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 3px;
    }

    /* New styles for settings modal */
    .luxury-card-shadow {
        box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
    }
    .gold-accent-border {
        border-left: 3px solid #b58d40;
    }
    .active-tab-glow {
        box-shadow: 0 4px 12px 0 rgba(17, 82, 212, 0.2);
    }
    .modal-overlay {
        backdrop-filter: blur(8px);
        background-color: rgba(15, 23, 42, 0.4);
    }
    .gold-modal-border {
        border: 1px solid rgba(181, 141, 64, 0.2);
        box-shadow: 0 0 0 1px rgba(181, 141, 64, 0.1), 0 20px 40px -10px rgba(0,0,0,0.1);
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-background-light text-navy-deep min-h-screen">
  <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
